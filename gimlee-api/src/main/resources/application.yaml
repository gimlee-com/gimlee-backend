server:
  port: 12060
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
  jetty:
    max-threads: 40
    min-threads: 40
    max-http-form-post-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

spring:
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 51MB
  messages:
    basename: i18n/messages,i18n/common/messages,i18n/auth/messages,i18n/purchases/messages,i18n/ads/messages,i18n/user/messages,i18n/payments/messages,i18n/location/messages,i18n/media/messages,i18n/chat/messages,i18n/support/messages,i18n/notifications/messages
    encoding: UTF-8

gimlee:
  scheduling:
    pool-size: 5
  # gimlee-auth properties
  auth:
    jwt:
      enabled: true
    rest:
      jwt:
        issuer: gimlee
      unsecured-paths: >
        /swagger-ui.html,
        /swagger-ui/**,
        /actuator/**,
        /v3/api-docs,
        /v3/api-docs/**,
        /ads/,
        /ads/**,
        /ads/*/stats,
        /spaces/**,
        /auth/register,
        /auth/register/**,
        /auth/login,
        /payments/currency/list,
        /session/init,
        /media,
        /playground/**,
        /qa/ads/**,
        /location/geoip/**,
        /location/countries/**
    ban:
      cache:
        ttl-seconds: 300
        max-size: 10000
      expiry-check-interval-ms: 60000

  # gimlee-user properties
  user:
    presence:
      flush-interval-ms: 60000
      online-threshold-minutes: 5
    preferences:
      default-currency: USD
      currency-mappings:
        pl-PL: PLN

  # gimlee-location properties
  location:
    geoip:
      enabled: true
      # license-key: <fillme> # MaxMind GeoLite2 license key (register at https://dev.maxmind.com/geoip/geolite2-free-geolocation-data)
      # database-path: /path/to/GeoLite2-Country.mmdb  # Optional: filesystem path override (takes priority over bundled database)
      # classpath-database: geoip/2026-04-11/GeoLite2-Country.mmdb  # Bundled database used as fallback when no license-key or database-path is set
      connect-timeout-ms: 10000
      read-timeout-ms: 60000

  # gimlee-analytics properties
  analytics:
    enabled: true
    bot-score-threshold: 0.7
    client-id-header: X-Client-Id
    bot-score-header: X-Crowdsec-Bot-Score

  # gimlee-ads properties
  ads:
    max-price:
      amount: 100
      currency: USD
    discovery:
      other-ads-count: 5
    admin:
      active-ads-count-cap: 10000
    category:
      sync:
        enabled: true
        cron: "0 0 0 1 * ?"
        lock:
          at-most: PT1H
          at-least: PT5M
      grounding:
        cron: "0 0 0 * * MON"
        lock:
          at-least: PT5M
    gpt:
      url-template: https://www.google.com/basepages/producttype/taxonomy-with-ids.%s.txt
      languages: en-US,pl-PL
    qa:
      question-max-length: 500
      answer-max-length: 2000
      max-unanswered-per-user-per-ad: 3
      max-questions-per-ad: 100
      max-community-answers-per-question: 3
      max-pinned-per-ad: 3
      cooldown-seconds: 300
      upvote-milestones: 5,10,25,50,100

  # gimlee-chat properties
  chat:
    history:
      default-limit: 20
    sse:
      buffer-ms: 200
      heartbeat-ms: 30000
    persistence:
      # batch-ms: 1000
      # batch-size: 100

  # gimlee-purchases properties
  purchases:
    price-tolerance-pct: 0.05

  # gimlee-notifications properties
  notifications:
    sse:
      timeout-ms: 0
      heartbeat-ms: 30000
    retention-days: 90
    cleanup:
      cron: "0 0 3 * * ?"

  # gimlee-payments properties
  payments:
    pirate-chain:
      monitor-threads: 1
      client:
        max-connections: 2
        response-timeout-millis: 1000
        connection-request-timeout-millis: 300
    ycash:
      monitor-threads: 1
      client:
        max-connections: 2
        response-timeout-millis: 1000
        connection-request-timeout-millis: 300
    exchange:
      update-interval-ms: 60000
      cleanup:
        cron: "0 0 1 * * ?"
        retention-days: 365
        lock:
          at-most: PT1H
          at-least: PT5M
      bitmart:
        base-url: https://api-cloud.bitmart.com
        volatility-threshold: 0.05
        volatility-klines-limit: 10
      mexc:
        base-url: https://api.mexc.com
      open-exchange-rates:
        base-url: https://openexchangerates.org/api
        update-interval-ms: 21600000
    volatility:
      downside-threshold: 0.05
      window-seconds: 600
      cooldown-seconds: 1800
      stabilization-checks: 3
      stale-threshold-seconds: 3600
