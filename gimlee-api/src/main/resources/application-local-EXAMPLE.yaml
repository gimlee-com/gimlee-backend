# mongodb
spring:
  data:
    mongodb:
      uri: mongodb://admin:password@localhost:27017/gimlee?authSource=admin&maxPoolSize=10
      repositories:
        type: auto
  # email config
  mail:
    host: <fillme>
    port: 587
    username: <fillme> # e.g. some@one.com
    password: <fillme> # SMTP password
    properties:
      from: <fillme>
      reply-to: <fillme>
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

gimlee:
  scheduling:
    pool-size: 5
  # gimlee-auth properties
  auth:
    rest:
      jwt:
        key: "this-must-be-at-least-32-characters-long-for-security" # JWT tokens will be signed with this key
    token:
      access-ttl-minutes: 15           # Access token TTL in minutes (short-lived)
      refresh-ttl-days: 30             # Refresh token TTL in days
      cleanup-interval-ms: 300000      # How often cleanup runs (ms) — default 5 min
      cleanup-batch-size: 10000        # Max tokens removed per cleanup run
      max-sessions-per-user: 10        # Maximum concurrent sessions per user
      revoked-retention-days: 7        # How long revoked tokens are kept for reuse detection
    ban:
      cache:
        ttl-seconds: 300          # How long banned user status is cached (seconds)
        max-size: 10000           # Maximum number of cached ban statuses
      expiry-check-interval-ms: 60000  # How often to check for expired temporary bans (ms)
      expiry-reminder:
        check-interval-ms: 300000  # How often to check for bans expiring soon (ms, default: 5 min)
        window-hours: 24           # How far ahead to look for expiring bans (hours)

  # gimlee-user properties
  user:
    preferences:
      default-currency: USD
      currency-mappings:
        pl-PL: PLN

  # gimlee-location properties
  location:
    geoip:
      enabled: true
      # license-key: <fillme> # Optional: MaxMind GeoLite2 license key to download fresh database from API (takes priority over bundled database)
      # database-path: /path/to/GeoLite2-Country.mmdb  # Optional: filesystem path override (takes priority over bundled database)
      # classpath-database: geoip/2026-04-11/GeoLite2-Country.mmdb  # Bundled database used as fallback — works out of the box
      connect-timeout-ms: 10000
      read-timeout-ms: 60000
    geonames:
      enabled: true
      # base-url: https://download.geonames.org/export/dump  # GeoNames data source
      # cities-file: cities500.zip  # Cities with population > 500
      # alternate-names-file: alternateNamesV2.zip  # Multilingual city names
      # admin1-file: admin1CodesASCII.txt  # Admin1 (state/province) code lookups
      # admin2-file: admin2Codes.txt  # Admin2 (county/district) code lookups
      index-path: ${java.io.tmpdir}/gimlee/geonames-index  # Lucene index storage
      # sync-cron: "0 0 3 * * *"  # Daily sync at 3 AM
      # download-timeout: 300s
      # connect-timeout: 30s
      # batch-size: 5000
      # max-suggestions: 10

  # gimlee-chat properties
  chat:
    conversation:
      default-max-participants: 50
    lock-sweep-interval-ms: 60000
    lock-sweep-batch-size: 100
    order:
      lock-on-complete: true
      lock-on-failed: true
      system-messages-enabled: true
      lock-delay-days: 14

  # gimlee-purchases properties
  purchases:
    price-tolerance-pct: 0.01

  # gimlee-media-store properties
  media:
    store:
      storage-type: LOCAL
      local:
        directory: <fillme> # (absolute path) - media files will be stored here

  # gimlee-payments properties
  payments:
    timeout-hours: 1
    pirate-chain:
      memo-prefix: "gimlee:"
      monitor-delay-ms: 60000
      min-confirmations: 1
      monitor-threads: 5
      client:
        rpc-url: http://127.0.0.1:45455
        user: gimlee
        password: gimlee
    ycash:
      memo-prefix: "gimlee:"
      monitor-delay-ms: 60000
      min-confirmations: 1
      monitor-threads: 1
      client:
        rpc-url: http://127.0.0.1:18232
        user: gimlee
        password: gimlee
    exchange:
      update-interval-ms: 60000
      cleanup:
        cron: "0 0 1 * * ?"
        retention-days: 365
        lock:
          at-most: PT1H
          at-least: PT5M
      bitmart:
        base-url: https://api-cloud.bitmart.com
      mexc:
        base-url: https://api.mexc.com
      open-exchange-rates:
        app-id: <fillme>
        update-interval-ms: 21600000
    deadline-reminder:
      window-minutes: 15
      check-interval-ms: 60000

  # gimlee-notifications properties
  notifications:
    sse:
      timeout-ms: 0
      heartbeat-interval-ms: 30000
    retention-days: 90
    cleanup-cron: "0 0 2 * * ?"

# Metrics related configurations
management:
  endpoint:
    metrics:
  endpoints:
    web:
      exposure:
        include: info,health,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
